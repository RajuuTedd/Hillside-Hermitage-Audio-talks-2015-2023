name: Update HH Archive RSS Feed
on:
  push:
    branches: [ main ]
  workflow_dispatch: # This adds a "Run now" button in GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the robot to save the feed.xml back to your repo
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run script
        run: python generate_feed.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          git commit -m "Automated feed update: $(date -u)" || exit 0
          git push
